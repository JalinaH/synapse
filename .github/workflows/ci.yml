name: CI

on:
    push:
        branches:
            - main
            - test
            - dev
    pull_request:

jobs:
    basic-checks:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Enable corepack
              run: corepack enable

            - name: Activate pnpm
              run: corepack prepare pnpm@9 --activate

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm lint

            - name: Build
              run: pnpm build
